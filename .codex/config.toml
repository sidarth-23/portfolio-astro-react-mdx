model = "gpt-5.4-mini"

[mcp_servers.astro-docs]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.docs.astro.build/mcp"]

[mcp_servers.dokploy-mcp]
command = "npx"
args = ["-y", "@dokploy/mcp"]
env_vars = ["DOKPLOY_API_KEY", "DOKPLOY_URL"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
