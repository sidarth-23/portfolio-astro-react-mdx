model = "gpt-5.3-codex"

[mcp_servers.astro-docs]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.docs.astro.build/mcp"]

[mcp_servers.dokploy-mcp]
command = "npx"
args = ["-y", "@dokploy/mcp"]
env_vars = ["DOKPLOY_API_KEY", "DOKPLOY_URL"]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]
